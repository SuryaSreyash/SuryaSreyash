## 🐍 My Contribution Snake

![Snake animation](https://github.com/SuryaSreyash/SuryaSreyash/blob/output/github-contribution-grid-snake-dark.svg)

<details>
<summary>⚙️ <b>How to activate the snake</b> (click to expand)</summary>
<br>

1. Go to your GitHub profile repo (`SuryaSreyash/SuryaSreyash`)
2. Create a folder: `.github/workflows/`
3. Create a file inside it: `snake.yml`
4. Paste this into the file:
```yaml
name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
